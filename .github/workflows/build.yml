name: Build

on:
  push:
    branches: [main, build-*]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── 代码质量检查 ──────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ── 测试 ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm rebuild better-sqlite3
      - run: npm test

  # ── 跨平台构建（Forge 原生 maker）────────────────────
  make:
    needs: [check, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            makers: deb,rpm
            deps: dpkg-dev rpm fakeroot

          - os: windows-latest
            label: win-x64
            makers: squirrel

          - os: macos-latest
            label: mac-x64
            makers: zip

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.deps }}

      - run: npm ci
      - run: npm rebuild better-sqlite3

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build distributables
        run: npm run make -- --targets=${{ matrix.makers }}

      - name: Create Arch Linux package (from Ubuntu x64 build)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          pkgname="shale"
          pkgver="1.0.0"
          pkgrel="1"
          pkgdir="/tmp/pkgroot"

          rm -rf "${pkgdir}"
          mkdir -p "${pkgdir}/usr/lib/${pkgname}"
          mkdir -p "${pkgdir}/usr/bin"
          mkdir -p "${pkgdir}/usr/share/applications"

          cp -r out/Shale-linux-x64/* "${pkgdir}/usr/lib/${pkgname}/"
          install -m644 shale.desktop "${pkgdir}/usr/share/applications/${pkgname}.desktop"
          ln -sf "/usr/lib/${pkgname}/Shale" "${pkgdir}/usr/bin/${pkgname}"
          chmod 4755 "${pkgdir}/usr/lib/${pkgname}/chrome-sandbox" 2>/dev/null || true

          install_size="$(du -sk "${pkgdir}" | cut -f1)"
          sed \
            -e "s/%PKGVER%/${pkgver}/g" \
            -e "s/%PKGREL%/${pkgrel}/g" \
            -e "s/%INSTALL_SIZE%/${install_size}/g" \
            shale.PKGINFO > "${pkgdir}/.PKGINFO"

          cd "${pkgdir}"
          bsdtar -cf .MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,size,sha256digest' \
            --uid=0 --gid=0 \
            -s '|^./||' \
            usr/ .PKGINFO 2>/dev/null || echo > .MTREE
          cd - > /dev/null

          cd "${pkgdir}"
          tar --zstd -cf "/tmp/${pkgname}-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst" \
            --transform 's|^./||' \
            .PKGINFO .MTREE usr/
          cd - > /dev/null

          cp "/tmp/${pkgname}-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst" ./shale-linux-arch-x86_64.pkg.tar.zst

      - name: Upload Arch package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: shale-linux-arch-x64
          path: ./*.pkg.tar.zst
          if-no-files-found: error

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shale-${{ matrix.label }}
          path: out/make/**/*
          if-no-files-found: error

  # ── GitHub Release（仅 v* 标签触发）──────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [make]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shale ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: true
          files: artifacts/**
