<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140" role="img" aria-labelledby="title desc">
  <title id="title">Settling point</title>
  <desc id="desc">A mineral-green point slowly pulls three viscous geological layers into a deepening fossil-like depression.</desc>
  <style>
    .frame { opacity: 0; }
    .frame-1 { animation: frame-1 3.6s step-end infinite; }
    .frame-2 { animation: frame-2 3.6s step-end infinite; }
    .frame-3 { animation: frame-3 3.6s step-end infinite; }
    .frame-4 { animation: frame-4 3.6s step-end infinite; }
    .frame-5 { animation: frame-5 3.6s step-end infinite; }
    .frame-6 { animation: frame-6 3.6s step-end infinite; }
    @keyframes frame-1 { 0%, 12.49% { opacity: 1; } 12.5%, 100% { opacity: 0; } }
    @keyframes frame-2 { 0%, 12.49% { opacity: 0; } 12.5%, 24.99% { opacity: 1; } 25%, 100% { opacity: 0; } }
    @keyframes frame-3 { 0%, 24.99% { opacity: 0; } 25%, 37.49% { opacity: 1; } 37.5%, 100% { opacity: 0; } }
    @keyframes frame-4 { 0%, 37.49% { opacity: 0; } 37.5%, 49.99% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes frame-5 { 0%, 49.99% { opacity: 0; } 50%, 62.49% { opacity: 1; } 62.5%, 100% { opacity: 0; } }
    @keyframes frame-6 { 0%, 62.49% { opacity: 0; } 62.5%, 100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .frame { animation: none !important; opacity: 0; }
      .frame-6 { opacity: 1; }
    }
  </style>
  <g class="frame frame-1">
