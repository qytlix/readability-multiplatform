    <circle cx="90" cy="104" r="6" fill="#5F7D72"/>
  </g>
  <g class="frame frame-6">
    <g fill="none" stroke-linecap="round" stroke-width="5"><path stroke="#A8A69F" d="M24 46c24-2 43-1 54 4 6 4 7 13 12 14 6-2 8-10 16-14 15-6 34-5 50-4"/><path stroke="#858A83" d="M20 76c25-1 46-3 58 2 6 4 6 12 12 15 6-3 8-11 16-15 14-5 32-4 54-4"/><path stroke="#6E736D" d="M25 106c24-2 42-2 52 3 7 5 7 19 13 23 7-4 8-18 17-23 14-6 32-5 50-3"/></g>
