    <circle cx="90" cy="59" r="6" fill="#5F7D72"/>
  </g>
  <g class="frame frame-4">
    <g fill="none" stroke-linecap="round" stroke-width="5"><path stroke="#A8A69F" d="M24 46c24-2 43-1 54 4 6 4 7 15 12 16 6-2 8-12 16-16 15-6 34-5 50-4"/><path stroke="#858A83" d="M20 76c25-1 46-3 58 2 6 4 6 13 12 16 6-3 8-12 16-16 14-5 32-4 54-4"/><path stroke="#6E736D" d="M25 106c25-1 44-3 55 0 6 2 7 6 10 8 4-2 6-6 12-8 14-3 36-2 55 0"/></g>
    <circle cx="90" cy="82" r="6" fill="#5F7D72"/>
