    <circle cx="90" cy="18" r="6" fill="#5F7D72"/>
  </g>
  <g class="frame frame-2">
    <g fill="none" stroke-linecap="round" stroke-width="5"><path stroke="#A8A69F" d="M24 46c27-1 46-2 56 1 6 2 7 9 10 11 4-3 5-9 12-11 14-4 34-3 54-1"/><path stroke="#858A83" d="M20 76c26 1 48-2 70-1 22 2 44 1 70-1"/><path stroke="#6E736D" d="M25 106c23-1 44 0 66-1 23-1 46 0 66 1"/></g>
    <circle cx="90" cy="39" r="6" fill="#5F7D72"/>
